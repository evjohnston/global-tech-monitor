name: build-and-deploy

on:
  # Daily at 07:00 UTC — after most arXiv announcements land.
  schedule:
    - cron: "0 7 * * *"
  # Deploy on push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Pull fresh data server-side (no CORS limits here).
      - name: Fetch data
        run: npm run fetch-data

      # Build with the repo name as base path for project Pages.
      # If deploying to a user/root or custom domain, set GTM_BASE to "/".
      - name: Build
        run: npm run build
        env:
          GTM_BASE: /${{ github.event.repository.name }}/
          # Live-data proxy (worker/) — a public URL, not a secret. Update
          # this if the Worker is ever redeployed under a different name.
          VITE_WORKER_URL: https://gtm-live-proxy.evjohnston.workers.dev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
