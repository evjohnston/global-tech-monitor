name: build-and-deploy

on:
  # Every 3 hours (bumped from once-daily 2026-07-20, when the frontend
  # stopped live-querying sources on page load — see App.tsx's
  # "static-store-only" comment. This nightly-turned-frequent build is now
  # the only thing that ever pulls fresh data; the old 3-minute browser
  # auto-refresh no longer exists, so this cadence is what "fresh" means.
  schedule:
    - cron: "0 */3 * * *"
  # Deploy on push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# cancel-in-progress: false (not GitHub's own template default of true) —
# originally needed because this workflow's own data commit used to push to
# main, self-triggering another run of this same workflow; confirmed
# 2026-07-19 that cancel-in-progress:true let a self-triggered run cancel a
# still-building one before it reached actions/deploy-pages (runs #16, #17).
# That specific self-trigger is gone now that data commits go to the `data`
# branch instead (2026-07-20, see "Commit updated data" below) — but
# schedule/workflow_dispatch/human-push can still overlap for other reasons,
# so queuing instead of cancelling stays the right default regardless.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Accumulated data lives on the `data` branch, not `main` (moved there
      # 2026-07-20 specifically so this job never has to commit to main —
      # see .gitignore and CLAUDE.md's "Data lives on its own branch"
      # section. A human working on main should never have to `git pull`
      # just because this job ran). public/data/ is gitignored on main, so
      # this seeds it from the data branch before fetch-data.ts runs —
      # otherwise readPrevious() would see nothing and every run would
      # restart trend[]/entries[] accumulation from zero. Falls through to
      # an empty public/data/ (same as any cold start) if the data branch
      # doesn't exist yet.
      - name: Seed public/data/ from the data branch
        run: |
          mkdir -p public/data
          if git fetch origin data --depth=1 2>/dev/null; then
            git archive origin/data -- public/data | tar -x
          else
            echo "no data branch yet — starting cold"
          fi

      # Pull fresh data server-side (no CORS limits here). Loops over every
      # vertical in src/lib/verticals.ts and writes public/data/<id>.json.
      - name: Fetch data
        run: npm run fetch-data
        env:
          OPENALEX_KEY: ${{ secrets.OPENALEX_KEY }}
          EPO_KEY: ${{ secrets.EPO_KEY }}
          EPO_SECRET: ${{ secrets.EPO_SECRET }}

      # Commit the updated data files to the `data` branch — never to
      # `main` — so trend[]/entries[] accumulation is real infrastructure
      # without a human ever needing to pull/merge past a bot commit on the
      # branch they actually work on. This job's own checkout stays on
      # `main` throughout (the Build step right after this still reads
      # public/data/ from disk, untouched by any of this); only a separate
      # worktree pointed at `data` receives the commit. Skips the commit if
      # nothing changed (a content-only diff, not a timestamp-only one,
      # would be nice here but generatedAt always differs — accept a commit
      # most runs, same as before this moved off main).
      # `git push` here can still lose a race against another run pushing to
      # `data` at the same time (e.g. a scheduled run overlapping a manual
      # dispatch) — self-heals the same way the old main-branch version did:
      # if a plain push is rejected, pull+rebase, and if THAT conflicts (it
      # can only be public/data/* — nothing else ever touches this branch),
      # keep this run's own freshly-regenerated files rather than attempting
      # a line-level merge of generated JSON.
      #
      # fetch-data.ts's own regression guard compares against whatever it
      # read at ITS seed step, which can be stale by the time THIS step
      # actually commits — a long-running fetch (OpenAlex+EPO+NSF+RSS across
      # every vertical, a few minutes) that started before another run's fix
      # landed will still finish with a smaller, stale-based result, and
      # naively overwriting origin/data with it discards real newer history.
      # Confirmed live 2026-07-20: a run's own regression check passed (its
      # drop was under its 20% threshold vs ITS seed) while still shrinking
      # origin/data's real entries[] by ~270 at commit time. The guard
      # belongs here instead — immediately before overwriting, compare
      # against origin/data's CURRENT file (already sitting in this
      # worktree, fetched seconds ago). Zero tolerance, not a percentage
      # threshold: entries[] only ever accumulates by design (the byId merge
      # never removes an id), so ANY decrease at this exact comparison point
      # means something's wrong, never a legitimate day's fluctuation — a
      # percentage cutoff here already missed the real incident once
      # (18.5% under an 80%-of-previous threshold looked "close enough").
      - name: Commit updated data to the data branch (not main)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data --depth=1
          git worktree add --detach /tmp/data-branch origin/data
          cd /tmp/data-branch
          git checkout -B data
          mkdir -p public/data
          node -e '
            const fs = require("fs");
            const path = require("path");
            const freshDir = process.env.GITHUB_WORKSPACE + "/public/data";
            const liveDir = "public/data";
            for (const file of fs.readdirSync(freshDir)) {
              if (!file.endsWith(".json")) continue;
              const fresh = JSON.parse(fs.readFileSync(path.join(freshDir, file), "utf8"));
              const livePath = path.join(liveDir, file);
              let keep = fresh;
              if (fs.existsSync(livePath)) {
                const live = JSON.parse(fs.readFileSync(livePath, "utf8"));
                if (fresh.entries.length < live.entries.length) {
                  console.error(
                    "REFUSING regression for " + file + ": this run built " + fresh.entries.length +
                    " entries, fewer than origin/data's current " + live.entries.length +
                    " — keeping origin/data, not overwriting"
                  );
                  keep = live;
                }
              }
              fs.writeFileSync(livePath, JSON.stringify(keep, null, 2));
            }
          '
          git add public/data/
          git diff --staged --quiet && echo "no data changes" && exit 0
          git commit -m "data: fetch $(date -u +"%Y-%m-%dT%H:%M:%SZ") [skip ci]"
          for i in 1 2 3; do
            if git push origin data; then exit 0; fi
            echo "push rejected, pulling and retrying ($i/3)"
            # NOTE: git rebase swaps merge terminology — "ours" is upstream
            # (origin/data), "theirs" is this run's own commit being
            # replayed. -X theirs / checkout --theirs keep THIS run's data,
            # not upstream's — confirmed against `man git-rebase` before
            # writing this originally, since getting ours/theirs backwards
            # here would silently reintroduce the data-loss bug this fixes.
            git pull --rebase -X theirs -s recursive origin data || {
              echo "rebase conflict — resolving by keeping this run's data"
              git checkout --theirs -- public/data/
              git add public/data/
              git rebase --continue
            }
          done
          git push origin data

      # Build with the repo name as base path for project Pages.
      # If deploying to a user/root or custom domain, set GTM_BASE to "/".
      - name: Build
        run: npm run build
        env:
          GTM_BASE: /${{ github.event.repository.name }}/
          # VITE_WORKER_URL removed 2026-07-20 — the frontend no longer
          # reads it (static-store-only, see App.tsx). The Worker itself is
          # still deployed, just unused by this build now; see CLAUDE.md.

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
