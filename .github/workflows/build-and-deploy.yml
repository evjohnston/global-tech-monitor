name: build-and-deploy

on:
  # Daily at 07:00 UTC — after most arXiv announcements land.
  schedule:
    - cron: "0 7 * * *"
  # Deploy on push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# cancel-in-progress: false (not GitHub's own template default of true) —
# this workflow's own "Commit updated data" step pushes back to main on
# almost every run (live fetches change entries[] most of the time), which
# fires a new workflow run for the same push event. With cancel-in-progress
# true, that self-triggered run cancels the very run that's still trying to
# build/deploy, before it ever reaches actions/deploy-pages — confirmed
# 2026-07-19 via two human pushes in quick succession both getting cancelled
# mid-build/mid-deploy (runs #16, #17), and the same mechanism would recur
# from the bot's own commit even without a human pushing twice. Queuing
# instead of cancelling means every push's deploy eventually completes,
# just possibly behind others in the queue rather than one being dropped.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Pull fresh data server-side (no CORS limits here). Loops over every
      # vertical in src/lib/verticals.ts and writes public/data/<id>.json.
      - name: Fetch data
        run: npm run fetch-data
        env:
          OPENALEX_KEY: ${{ secrets.OPENALEX_KEY }}
          EPO_KEY: ${{ secrets.EPO_KEY }}
          EPO_SECRET: ${{ secrets.EPO_SECRET }}

      # Commit the updated data files back to main so trend[]/entries[]
      # accumulation is real infrastructure, not something that only happens
      # when a human runs fetch-data locally and commits by hand. Found
      # missing during the multi-vertical build (2026-07-19) — before this,
      # every nightly run's accumulated result was discarded after that run's
      # deploy, since nothing ever persisted it back to the repo; the "start
      # from prev.entries" merge in fetch-data.ts only helps if there's a
      # real prev file to start from. Skips the commit if nothing changed
      # (a content-only diff, not a timestamp-only one, would be nice here
      # but generatedAt always differs — accept a commit most nights).
      # `git push` here can lose a race against anything else that pushed to
      # main since this job's checkout (another queued run, or a human's own
      # push) — confirmed 2026-07-19 when a rejected push led to a by-hand
      # conflict resolution that left literal <<<<<<< markers committed into
      # quantum-computing.json, breaking the live site until caught. This
      # step self-heals that race instead of failing or leaving markers: if
      # a plain push is rejected, pull+rebase, and if THAT conflicts (it can
      # only be public/data/* — nothing else changed in this job), keep this
      # run's own freshly-regenerated files rather than attempting a
      # line-level merge of generated JSON. This run's data already
      # accumulated from whatever prev.entries/trend existed at checkout, so
      # it's a complete, valid regeneration on its own — never partial,
      # never marker-laden.
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "no data changes" && exit 0
          git commit -m "data: nightly fetch $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "push rejected, pulling and retrying ($i/3)"
            # NOTE: git rebase swaps merge terminology — "ours" is upstream
            # (origin/main), "theirs" is this run's own commit being
            # replayed. -X theirs / checkout --theirs keep THIS run's data,
            # not upstream's — confirmed against `man git-rebase` before
            # writing this, since getting ours/theirs backwards here would
            # silently reintroduce the exact data-loss bug this fixes.
            git pull --rebase -X theirs -s recursive origin main || {
              echo "rebase conflict outside public/data/ — resolving by keeping this run's data"
              git checkout --theirs -- public/data/
              git add public/data/
              git rebase --continue
            }
          done
          git push

      # Build with the repo name as base path for project Pages.
      # If deploying to a user/root or custom domain, set GTM_BASE to "/".
      - name: Build
        run: npm run build
        env:
          GTM_BASE: /${{ github.event.repository.name }}/
          # Live-data proxy (worker/) — a public URL, not a secret. Update
          # this if the Worker is ever redeployed under a different name.
          VITE_WORKER_URL: https://gtm-live-proxy.evjohnston.workers.dev

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
